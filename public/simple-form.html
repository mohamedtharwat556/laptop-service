<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج بسيط</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        form {
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>نموذج تقديم طلب بسيط</h1>
    <form id="simpleForm">
        <div class="form-group">
            <label>الاسم:</label>
            <input type="text" id="fullName" required>
        </div>
        <div class="form-group">
            <label>رقم الهاتف:</label>
            <input type="tel" id="phone" required>
        </div>
        <div class="form-group">
            <label>ماركة اللابتوب:</label>
            <input type="text" id="laptopBrand" required>
        </div>
        <div class="form-group">
            <label>موديل اللابتوب:</label>
            <input type="text" id="laptopModel" required>
        </div>
        <div class="form-group">
            <label>نوع الجهاز:</label>
            <input type="text" id="deviceType" required>
        </div>
        <div class="form-group">
            <label>وصف المشكلة:</label>
            <textarea id="problemDescription" required></textarea>
        </div>
        <button type="submit">إرسال الطلب</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('simpleForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const result = document.getElementById('result');
            result.textContent = 'جاري الإرسال...';

            const data = {
                requestNumber: 'REQ-' + Date.now(),
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                laptopBrand: document.getElementById('laptopBrand').value,
                laptopModel: document.getElementById('laptopModel').value,
                deviceType: document.getElementById('deviceType').value,
                problemDescription: document.getElementById('problemDescription').value,
                priority: 'Medium'
            };

            try {
                const response = await fetch('/api/requests', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const responseData = await response.json();

                if (response.ok) {
                    result.innerHTML = '<h3 style="color: green;">تم الإرسال بنجاح!</h3><p>رقم الطلب: ' + responseData.request_number + '</p>';
                } else {
                    result.innerHTML = '<h3 style="color: red;">فشل الإرسال</h3><p>' + JSON.stringify(responseData) + '</p>';
                }
            } catch (error) {
                result.innerHTML = '<h3 style="color: red;">خطأ</h3><p>' + error.message + '</p>';
            }
        });
    </script>
</body>
</html>
