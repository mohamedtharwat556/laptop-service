<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأدمن البسيطة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: right;
        }
        th {
            background: #007bff;
            color: white;
        }
        button {
            padding: 5px 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            margin: 5px;
        }
        button.delete {
            background: #dc3545;
        }
        #refresh {
            background: #28a745;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>لوحة الأدمن البسيطة</h1>
    <button id="refresh" onclick="loadRequests()">تحديث الطلبات</button>
    <table id="requestsTable">
        <thead>
            <tr>
                <th>رقم الطلب</th>
                <th>الاسم</th>
                <th>الهاتف</th>
                <th>الماركة</th>
                <th>الموديل</th>
                <th>الحالة</th>
                <th>الأولوية</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody id="requestsBody"></tbody>
    </table>

    <script>
        async function loadRequests() {
            try {
                const response = await fetch('/api/requests');
                const requests = await response.json();
                const tbody = document.getElementById('requestsBody');
                tbody.innerHTML = '';

                requests.forEach(request => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${request.requestNumber}</td>
                        <td>${request.fullName}</td>
                        <td>${request.phone}</td>
                        <td>${request.laptopBrand}</td>
                        <td>${request.laptopModel}</td>
                        <td>${request.status}</td>
                        <td>${request.priority}</td>
                        <td>
                            <button onclick="updateStatus(${request.id}, 'In Progress')">قيد التنفيذ</button>
                            <button onclick="updateStatus(${request.id}, 'Completed')">مكتمل</button>
                            <button class="delete" onclick="deleteRequest(${request.id})">حذف</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                alert('خطأ في تحميل الطلبات: ' + error.message);
            }
        }

        async function updateStatus(id, status) {
            try {
                const response = await fetch(`/api/requests/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: status })
                });
                if (response.ok) {
                    alert('تم تحديث الحالة');
                    loadRequests();
                } else {
                    alert('فشل تحديث الحالة');
                }
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        }

        async function deleteRequest(id) {
            if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) {
                try {
                    const response = await fetch(`/api/requests/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('تم حذف الطلب');
                        loadRequests();
                    } else {
                        alert('فشل حذف الطلب');
                    }
                } catch (error) {
                    alert('خطأ: ' + error.message);
                }
            }
        }

        // Load requests on page load
        loadRequests();
    </script>
</body>
</html>
